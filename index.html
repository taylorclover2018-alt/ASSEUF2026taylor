<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Financeiro Oficial</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="layout">

    <aside class="sidebar">
        <h2>Financeiro</h2>
        <p>Sistema Oficial</p>
    </aside>

    <main class="main">

        <header>
            <h1>Dashboard de Prestação de Contas</h1>
        </header>

        <section class="kpis">
            <div class="kpi">
                <h3>Total Geral</h3>
                <p id="kpiTotal">R$ 0,00</p>
            </div>

            <div class="kpi">
                <h3>Total Auxílio</h3>
                <p id="kpiAuxilio">R$ 0,00</p>
            </div>

            <div class="kpi">
                <h3>Rotas</h3>
                <p id="kpiRotas">0</p>
            </div>
        </section>

        <section class="formulario">
            <input type="number" id="auxilio" placeholder="Valor total do auxílio">
            <button onclick="adicionarRota()">Adicionar Rota</button>
        </section>

        <div id="rotas"></div>

        <button class="btnCalcular" onclick="calcular()">Calcular</button>

        <section class="graficos">
            <canvas id="graficoBarra"></canvas>
            <canvas id="graficoPizza"></canvas>
        </section>

    </main>
</div>

<script src="app.js"></script>
</body>
</html>
