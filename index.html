<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Transporte Associação</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<h1>Fechamento Transporte</h1>

<div class="card">
<label>Auxílio Total:</label>
<input type="number" id="auxilioTotal" value="4000">
</div>

<!-- ROTA 7 LAGOAS -->
<div class="card">
<h2>Rota 7 Lagoas</h2>

<label>Dias rodados:</label>
<input type="number" id="dias0" value="20"><br><br>

<label>Alunos Integrais:</label>
<input type="number" id="integral0" value="12"><br><br>

<label>Alunos 50%:</label>
<input type="number" id="desc0" value="2"><br><br>

<label>Quantidade de veículos:</label>
<input type="number" min="0" value="1" onchange="gerarVeiculos(0,this.value)">
<div id="veiculos0"></div>
</div>

<!-- ROTA CURVELO -->
<div class="card">
<h2>Rota Curvelo</h2>

<label>Dias rodados:</label>
<input type="number" id="dias1" value="20"><br><br>

<label>Alunos Integrais:</label>
<input type="number" id="integral1" value="12"><br><br>

<label>Alunos 50%:</label>
<input type="number" id="desc1" value="2"><br><br>

<label>Quantidade de veículos:</label>
<input type="number" min="0" value="1" onchange="gerarVeiculos(1,this.value)">
<div id="veiculos1"></div>
</div>

<button onclick="calcular()">Calcular</button>
<button onclick="gerarPDF()">Gerar PDF</button>

<table id="tabelaResultado">
<thead>
<tr>
<th>Rota</th>
<th>Total Bruto</th>
<th>Auxílio</th>
<th>Total Líquido</th>
<th>Integral</th>
<th>50%</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div id="graficoContainer">
<canvas id="graficoRateio"></canvas>
</div>

<script src="app.js"></script>
</body>
</html>
