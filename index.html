<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Oficial de Prestação de Contas</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

<div class="app">

<header>
<h1>Prestação de Contas Oficial</h1>
<p>Sistema proporcional com regra 70/30 por excedente de dias</p>
</header>

<section class="card">
<h2>Informações Gerais</h2>

<label>Mês de referência</label>
<input type="month" id="mes">

<label>Valor total do auxílio (R$)</label>
<input type="number" id="auxilio">

<label>Aplicar regra 70/30 no excedente?</label>
<select id="usarRegra">
<option value="sim">Sim</option>
<option value="nao">Não</option>
</select>
</section>

<section class="grid">

<div class="rota card">
<h2>Rota 7 Lagoas</h2>

<label>Valor da passagem</label>
<input type="number" id="passagem0">

<label>Quantidade de veículos</label>
<input type="number" id="veiculos0">

<label>Valor da diária por veículo</label>
<input type="number" id="diaria0">

<label>Dias rodados</label>
<input type="number" id="dias0">

<label>Alunos integrais</label>
<input type="number" id="integral0">

<label>Alunos com desconto 1</label>
<input type="number" id="descAlunos0">

<label>% desconto 1</label>
<input type="number" id="descPerc0">

<label>Possui desconto 2?</label>
<select id="temDesc2_0" onchange="toggleDesc2(0)">
<option value="nao">Não</option>
<option value="sim">Sim</option>
</select>

<div id="desc2_0" class="hidden">
<label>Alunos desconto 2</label>
<input type="number" id="desc2Alunos0">
<label>% desconto 2</label>
<input type="number" id="desc2Perc0">
</div>
</div>

<div class="rota card">
<h2>Rota Curvelo</h2>

<label>Valor da passagem</label>
<input type="number" id="passagem1">

<label>Quantidade de veículos</label>
<input type="number" id="veiculos1">

<label>Valor da diária por veículo</label>
<input type="number" id="diaria1">

<label>Dias rodados</label>
<input type="number" id="dias1">

<label>Alunos integrais</label>
<input type="number" id="integral1">

<label>Alunos com desconto 1</label>
<input type="number" id="descAlunos1">

<label>% desconto 1</label>
<input type="number" id="descPerc1">

<label>Possui desconto 2?</label>
<select id="temDesc2_1" onchange="toggleDesc2(1)">
<option value="nao">Não</option>
<option value="sim">Sim</option>
</select>

<div id="desc2_1" class="hidden">
<label>Alunos desconto 2</label>
<input type="number" id="desc2Alunos1">
<label>% desconto 2</label>
<input type="number" id="desc2Perc1">
</div>
</div>

</section>

<button class="btn" onclick="calcular()">Calcular</button>
<button class="btn verde" onclick="gerarPDF()">Gerar PDF Oficial</button>

<section class="card">
<h2>Resultado</h2>
<div id="resultado"></div>
</section>

<section class="charts">
<canvas id="graficoFinanceiro"></canvas>
<canvas id="graficoAuxilio"></canvas>
</section>

</div>

<script src="app.js"></script>
</body>
</html>
