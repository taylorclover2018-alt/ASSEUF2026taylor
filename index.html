<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Oficial de Prestação de Contas</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

<div class="container">

<h1>Sistema Oficial de Prestação de Contas</h1>

<div class="card">
<label>Mês de Referência</label>
<input type="month" id="mes">
</div>

<div class="card">
<label>Valor Total do Auxílio (R$)</label>
<input type="number" id="auxilio" placeholder="Ex: 15000">
</div>

<h2>Rotas</h2>
<div id="rotas"></div>

<button onclick="adicionarRota()">+ Adicionar Rota</button>

<button class="calcular" onclick="calcular()">Calcular Distribuição</button>

<div id="resultado"></div>

<canvas id="graficoFinanceiro"></canvas>
<canvas id="graficoPercentual"></canvas>

<button class="pdf" onclick="gerarPDF()">Gerar PDF Oficial</button>

</div>

<script src="app.js"></script>
</body>
</html>
